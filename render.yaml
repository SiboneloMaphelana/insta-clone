# Render Blueprint: JSON Server API + static Angular app.
# Docs: https://render.com/docs/infrastructure-as-code
#
# Default URLs (if you keep these service names):
#   API:  https://hanami-api.onrender.com
#   App:  https://hanami-web.onrender.com
#
# If your dashboard shows a different API URL (suffix, custom domain), set
# API_BASE_URL on hanami-web to that origin (no trailing slash) and redeploy.

services:
  - type: web
    name: hanami-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run server:prod
    healthCheckPath: /users

  - type: web
    name: hanami-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/hanami
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_BASE_URL
        value: https://hanami-api.onrender.com
