<div class="auth-page">
  <form class="auth-card" [formGroup]="registerForm" (ngSubmit)="onRegister()">
    <h2 class="auth-card-title">
      Join the vibe
      <iconify-icon
        icon="mdi:party-popper"
        class="auth-title-icon"
        aria-hidden="true"
      ></iconify-icon>
    </h2>

    <label for="name">
      Name
      <input
        type="text"
        id="name"
        formControlName="name"
        autocomplete="name"
        (input)="clearFeedback()"
        [class.error]="!!nameErrorMessage"
      />
      <span class="error-message" *ngIf="nameErrorMessage">
        {{ nameErrorMessage }}
      </span>
    </label>

    <label for="email">
      Email
      <input
        type="email"
        id="email"
        formControlName="email"
        autocomplete="email"
        (input)="clearFeedback()"
        [class.error]="!!emailErrorMessage"
      />
      <span class="error-message" *ngIf="emailErrorMessage">
        {{ emailErrorMessage }}
      </span>
    </label>

    <label for="password">
      Password
      <input
        type="password"
        id="password"
        formControlName="password"
        autocomplete="new-password"
        (input)="clearFeedback()"
        [class.error]="!!passwordErrorMessage"
      />
      <span class="field-note">
        Use at least 8 characters with letters and numbers.
      </span>
      <span class="error-message" *ngIf="passwordErrorMessage">
        {{ passwordErrorMessage }}
      </span>
    </label>

    <label for="confirm-password">
      Confirm Password
      <input
        type="password"
        id="confirm-password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        (input)="clearFeedback()"
        [class.error]="!!confirmPasswordErrorMessage"
      />
      <span class="error-message" *ngIf="confirmPasswordErrorMessage">
        {{ confirmPasswordErrorMessage }}
      </span>
    </label>

    <div class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Creating your account...' : 'Sign me up' }}
    </button>

    <p>Already in? <a routerLink="/login">Log in</a></p>
  </form>
</div>
