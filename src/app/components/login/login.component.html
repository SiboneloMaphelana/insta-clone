<div class="auth-page">
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-card">
    <h2 class="auth-card-title">
      Hey, welcome back
      <iconify-icon
        icon="mdi:sparkles"
        class="auth-title-icon"
        aria-hidden="true"
      ></iconify-icon>
    </h2>

    <p class="info-message" *ngIf="infoMessage">
      {{ infoMessage }}
    </p>

    <label for="email">
      Email
      <input
        type="email"
        name="email"
        id="email"
        formControlName="email"
        autocomplete="email"
        (input)="clearFeedback()"
        [class.error]="!!emailErrorMessage"
      />
      <span class="error-message" *ngIf="emailErrorMessage">
        {{ emailErrorMessage }}
      </span>
    </label>

    <label for="password">
      Password
      <input
        type="password"
        name="password"
        id="password"
        formControlName="password"
        autocomplete="current-password"
        (input)="clearFeedback()"
        [class.error]="!!passwordErrorMessage"
      />
      <span class="error-message" *ngIf="passwordErrorMessage">
        {{ passwordErrorMessage }}
      </span>
    </label>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Logging you in...' : "Let's go" }}
    </button>

    <p>New here?</p>
    <a routerLink="/register">
      Create an account
      <iconify-icon
        icon="mdi:arrow-right"
        class="auth-link-icon"
        aria-hidden="true"
      ></iconify-icon>
    </a>
  </form>
</div>
